name: Terraform Bootstrap

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.11.1
  BUCKET_NAME: terraform-state-solidary-tech-backend

jobs:
  Bootstrap:
    name: Terraform-Init
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap backend if needed
        run: |
          set -euo pipefail

          echo "BUCKET_NAME: $BUCKET_NAME"
          echo "AWS_REGION: $AWS_REGION"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Bucket existente. Pulando bootstrap."
          else
            echo "Bucket não existe. Criando backend..."
            cd bootstrap
            terraform init
            terraform apply -auto-approve
            cd ..
          fi

  Terraform-Init-Development:
      name: Terraform-Init-Development
      runs-on: ubuntu-latest
      needs: Bootstrap
      environment: Development
      env:
        WORK_DIR: Environments/Development/

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: ${{ env.TF_VERSION }}
            terraform_wrapper: false

        - name: Configure AWS
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Terraform_fmt
          working-directory: ${{ env.WORK_DIR }}
          run: terraform fmt -check -recursive

        - name: Init
          working-directory: ${{ env.WORK_DIR }}
          run: terraform init -reconfigure

        - name: Validate
          working-directory: ${{ env.WORK_DIR }}
          run: terraform validate

        - name: Plan
          working-directory: ${{ env.WORK_DIR }}
          run: |
            terraform plan -no-color -out=tfplan

  Terraform-Init-Staging:
    name: Terraform-Init-Staging
    runs-on: ubuntu-latest
    needs: Bootstrap
    environment: Staging
    env:
      WORK_DIR: Environments/Staging/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform_fmt
        working-directory: ${{ env.WORK_DIR }}
        run: terraform fmt -check -recursive

      - name: Init
        working-directory: ${{ env.WORK_DIR }}
        run: terraform init -reconfigure

      - name: Validate
        working-directory: ${{ env.WORK_DIR }}
        run: terraform validate

      - name: Plan
        working-directory: ${{ env.WORK_DIR }}
        run: |
          terraform plan -no-color -out=tfplan

  Terraform-Init-Production:
    name: Terraform-Init-Production
    runs-on: ubuntu-latest
    environment: Production
    env:
      WORK_DIR: Environments/Production/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform_fmt
        working-directory: ${{ env.WORK_DIR }}
        run: terraform fmt -check -recursive

      - name: Init
        working-directory: ${{ env.WORK_DIR }}
        run: terraform init -reconfigure

      - name: Validate
        working-directory: ${{ env.WORK_DIR }}
        run: terraform validate

      - name: Plan
        working-directory: ${{ env.WORK_DIR }}
        run: |
          terraform plan -no-color -out=tfplan
